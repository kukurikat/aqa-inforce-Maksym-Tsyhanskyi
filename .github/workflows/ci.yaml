name: AQA CI/CD

on:
  push:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:20
    steps:
      - user: actions/checkout@v4
        with:
          node-version: "0"
      - run: npm install
      - run: npm ci
      - run: npm run linter
      - run: npm test
